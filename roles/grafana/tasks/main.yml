- name: Add Grafana repo
  apt_repository:
    repo: "deb https://packages.grafana.com/oss/deb stable main"

- name: Add key
  apt_key:
    url: https://packages.grafana.com/gpg.key

- name: Install Grafana
  apt:
    name: grafana
    state: present
    update_cache: yes

- name: Start Grafana
  systemd:
    name: grafana-server
    state: started
    enabled: yes
