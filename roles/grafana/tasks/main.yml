# 1. Install required packages
- name: Install dependencies
  apt:
    name:
      - apt-transport-https
      - software-properties-common
      - wget
    state: present
    update_cache: yes

# 2. Create keyrings directory
- name: Create keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

# 3. Add Grafana GPG key (modern method)
- name: Download Grafana GPG key
  get_url:
    url: https://packages.grafana.com/gpg.key
    dest: /etc/apt/keyrings/grafana.key
    mode: '0644'

# 4. Add Grafana repository (secure way)
- name: Add Grafana repo
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/grafana.key] https://packages.grafana.com/oss/deb stable main"
    state: present
    filename: grafana

# 5. Update apt cache
- name: Update apt cache
  apt:
    update_cache: yes

# 6. Install Grafana
- name: Install Grafana
  apt:
    name: grafana
    state: present

# 7. Start Grafana
- name: Start Grafana
  systemd:
    name: grafana-server
    state: started
    enabled: yes
